<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vida Social</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #050F2D, #0B2A5B);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .container {
      max-width: 760px;
      padding: 40px 24px;
    }

    .logo {
      font-size: 76px;
      font-weight: bold;
      letter-spacing: 2px;
      margin-bottom: 10px;
    }

    h1 {
      font-size: 44px;
      margin: 10px 0;
    }

    p {
      font-size: 22px;
      line-height: 1.5;
      opacity: 0.9;
    }

    .button {
      display: inline-block;
      margin-top: 28px;
      padding: 16px 28px;
      background: #2D7FF9;
      color: white;
      text-decoration: none;
      border-radius: 14px;
      font-size: 18px;
      font-weight: bold;
    }

    .links {
      margin-top: 40px;
      font-size: 14px;
      opacity: 0.85;
    }

    .links a {
      color: white;
      margin: 0 10px;
      text-decoration: underline;
    }
  </style>
</head>

<body>
  <main class="container">
    <div class="logo">VS</div>
    <h1>Vida Social</h1>

    <p>
      Conecta con personas cerca de ti, participa en tu comunidad
      y descubre lo que ocurre en tu comuna.
    </p>

    <a class="button" href="#">
      Disponible próximamente en Google Play
    </a>

    <div class="links">
      <a href="#">Política de privacidad</a>
      <a href="#">Términos y condiciones</a>
      <a href="mailto:soporte@vidasocial.app">Soporte</a>
    </div>
  </main>
</body>
</html>
